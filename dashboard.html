```html
<!DOCTYPE html>
<html>
<head>
<title>MG Squid Squad Dashboard</title>

<style>

body{
background:#1f1f1f;
font-family:Arial;
color:white;
margin:0;
}

.container{
width:95%;
margin:auto;
}

.top{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:10px;
}

.box{
background:#3a3a3a;
padding:20px;
text-align:center;
font-size:22px;
}

.top-number{
font-size:55px;
color:black;
font-weight:bold;
}

.subtitle{
font-size:18px;
margin-top:5px;
}

.title{
background:black;
text-align:center;
font-size:40px;
padding:10px;
margin:10px 0;
}

.green-text{
color:#39c46a;
}

.main{
display:grid;
grid-template-columns:3fr 1fr;
gap:10px;
}

.zone-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.zone{
text-align:center;
padding:30px;
}

.zone h2{
font-size:35px;
}

.zone-number{
font-size:140px;
font-weight:bold;
}

.red{background:#d61c1c;}
.yellow{background:#e5c100;color:black;}
.green{background:#1c7c37;}

.sidebar{
background:#3a3a3a;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}

</style>
</head>

<body>

<div class="container">

<div class="top">

<div class="box">
People in Site
<div class="top-number">35</div>
<div class="subtitle">15 + 12 + 8</div>
</div>

<div class="box">
Masking Active

</div>

<div class="box">
Ticket Red Zone Active
<div class="top-number">0</div>
</div>

<div class="box">
Ticket Parking Active
<div class="top-number">0</div>
</div>

</div>

<div class="title">
MG <span class="green-text">Squid Squad</span>
</div>

<div class="main">

<div class="zone-grid">

<div class="zone red">
<h2>Red Zone</h2>
<div class="zone-number">15</div>
</div>

<div class="zone yellow">
<h2>Yellow Zone</h2>

</div>

<div class="zone green">

<div class="zone-number">8</div>
</div>

</div>

Owner Meilie

</div>

</div>

</body>
</html>
